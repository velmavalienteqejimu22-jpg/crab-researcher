services:
  - type: web
    name: crab-researcher-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python3 -m patchright install chromium || true
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FEISHU_WEBHOOK_URL
        sync: false
      - key: FEISHU_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: "https://crab-researcher.vercel.app"
